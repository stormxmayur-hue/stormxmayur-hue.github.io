STUDY HUB
<!DOCTYPE html>
<html>
<head>

<title>Storm Study Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
display:flex;
}

.light{
background:white;
color:black;
}

.sidebar{
width:220px;
background:#020617;
height:100vh;
padding:20px;
}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

.main{
flex:1;
padding:40px;
}

.section{
display:none;
}

.active{
display:block;
}

#time{
font-size:40px;
margin:20px;
}

.progress{
width:60%;
height:20px;
background:#1e293b;
border-radius:10px;
}

.bar{
height:20px;
background:#38bdf8;
width:0%;
border-radius:10px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:60%;
}

button{
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Storm Hub</h3>

<button onclick="show('home')">Home</button>
<button onclick="show('timer')">Study Timer</button>
<button onclick="show('study')">Study Tracker</button>
<button onclick="show('hobby')">Hobbies</button>
<button onclick="show('notes')">Notes</button>
<button onclick="show('calc')">Calculator</button>
<button onclick="show('chart')">Progress Chart</button>

<button onclick="toggleMode()">Theme</button>

</div>

<div class="main">

<div id="home" class="section active">

<h1>Storm Study Hub 🚀</h1>

<p>JEE Productivity Dashboard</p>

<button onclick="motivation()">Motivation</button>

<p id="quote"></p>

<button id="installBtn" style="display:none">Install App</button>

</div>

<div id="timer" class="section">

<h2>Study Timer</h2>

<div id="time">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div id="study" class="section">

<h2>Study Hours</h2>

<input id="hours" type="number">

<button onclick="saveHours()">Save</button>

<div class="progress">
<div class="bar" id="studyBar"></div>
</div>

</div>

<div id="hobby" class="section">

<h2>Hobby Tracker</h2>

<input id="hobbyName" placeholder="Hobby">

<input id="hobbyProgress" type="number" placeholder="%">

<button onclick="addHobby()">Add</button>

<div id="hobbyList"></div>

</div>

<div id="notes" class="section">

<h2>Notes</h2>

<textarea id="note"></textarea>

<button onclick="saveNote()">Save</button>

<p id="savedNote"></p>

</div>

<div id="calc" class="section">

<h2>Calculator</h2>

<input id="n1">
<input id="n2">

<br><br>

<button onclick="calc('+')">+</button>
<button onclick="calc('-')">-</button>
<button onclick="calc('*')">*</button>
<button onclick="calc('/')">/</button>

<h3 id="result"></h3>

</div>

<div id="chart" class="section">

<h2>Weekly Study Chart</h2>

<canvas id="chartCanvas"></canvas>

</div>

<footer>

<p>Created by Storm</p>
<p>Email: your-email@example.com</p>

</footer>

</div>

<script>

function show(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

let time=1500
let timer

function startTimer(){

timer=setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("time").innerText=
m+":"+(s<10?"0"+s:s)

time--

},1000)

}

function resetTimer(){

clearInterval(timer)
time=1500
document.getElementById("time").innerText="25:00"

}

function toggleMode(){

document.body.classList.toggle("light")

}

function saveHours(){

let h=document.getElementById("hours").value

document.getElementById("studyBar").style.width=(h*10)+"%"

let week=JSON.parse(localStorage.getItem("weekStudy"))||[]

week.push(h)

if(week.length>7) week.shift()

localStorage.setItem("weekStudy",JSON.stringify(week))

loadChart()

}

function addHobby(){

let name=document.getElementById("hobbyName").value
let prog=document.getElementById("hobbyProgress").value

let div=document.createElement("div")

div.innerHTML=
"<p>"+name+"</p><div class='progress'><div class='bar' style='width:"+prog+"%'></div></div>"

document.getElementById("hobbyList").appendChild(div)

}

function saveNote(){

let note=document.getElementById("note").value

localStorage.setItem("note",note)

document.getElementById("savedNote").innerText=note

}

function calc(op){

let a=Number(document.getElementById("n1").value)
let b=Number(document.getElementById("n2").value)

let r

if(op=="+") r=a+b
if(op=="-") r=a-b
if(op=="*") r=a*b
if(op=="/") r=a/b

document.getElementById("result").innerText=r

}

function loadChart(){

let week=JSON.parse(localStorage.getItem("weekStudy"))||[]

new Chart(document.getElementById("chartCanvas"),{

type:"bar",

data:{
labels:["1","2","3","4","5","6","7"],

datasets:[{
label:"Study Hours",
data:week
}]

}

})

}

loadChart()

function motivation(){

let quotes=[
"Keep pushing forward",
"Discipline beats motivation",
"One day IIT",
"Consistency wins",
"Small progress daily"
]

document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)]

}

let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").style.display="block"

})

document.getElementById("installBtn").addEventListener("click",()=>{

deferredPrompt.prompt()

})

</script>

</body>
</html>
```
