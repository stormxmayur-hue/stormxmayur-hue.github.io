```html
<!DOCTYPE html>
<html>
<head>

<title>Storm Study Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
transition:0.3s;
}

.light{
background:white;
color:black;
}

nav{
background:#020617;
padding:15px;
}

nav a{
margin:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

section{
padding:40px;
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

input,textarea{
padding:8px;
margin:6px;
}

.progress{
width:60%;
height:20px;
background:#1e293b;
margin:auto;
border-radius:10px;
}

.bar{
height:20px;
width:0%;
background:#38bdf8;
border-radius:10px;
}

#time{
font-size:40px;
margin:20px;
}

.card{
background:#1e293b;
width:70%;
margin:auto;
padding:20px;
border-radius:10px;
margin-top:10px;
}

footer{
background:#020617;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<nav>

<a href="#home">Home</a>
<a href="#timer">Timer</a>
<a href="#study">Study</a>
<a href="#hobby">Hobbies</a>
<a href="#notes">Notes</a>
<a href="#chart">Progress</a>

<button onclick="toggleMode()">Mode</button>

</nav>

<section id="home">

<h1>Storm Study Hub 🚀</h1>

<p>JEE + Productivity Dashboard</p>

<button id="installBtn" style="display:none">Install App 📱</button>

<h3 id="streak">Study Streak: 0 days</h3>

</section>

<section id="timer">

<h2>Study Timer</h2>

<div id="time">25:00</div>

<button onclick="startTimer()">Start</button>

</section>

<section id="study">

<h2>Study Hours Today</h2>

<input id="hours" type="number" placeholder="Hours">

<button onclick="saveHours()">Save</button>

<p id="studyText"></p>

<div class="progress">
<div class="bar" id="studyBar"></div>
</div>

</section>

<section id="hobby">

<h2>Hobby Tracker</h2>

<input id="hobbyName" placeholder="Hobby name">

<input id="hobbyProgress" type="number" placeholder="Progress %">

<button onclick="addHobby()">Add</button>

<div id="hobbyList"></div>

</section>

<section id="notes">

<h2>Quick Notes</h2>

<textarea id="note" rows="4" cols="40"></textarea>

<br>

<button onclick="saveNote()">Save Note</button>

<p id="savedNote"></p>

</section>

<section id="chart">

<h2>Weekly Study Progress</h2>

<canvas id="studyChart"></canvas>

</section>

<footer>

<p>Created by Storm</p>
<p>Email: storm@email.com</p>

</footer>

<script>

let time=1500

function startTimer(){

setInterval(function(){

let m=Math.floor(time/60)
let s=time%60

document.getElementById("time").innerText=
m+":"+(s<10?"0"+s:s)

time--

},1000)

}

function toggleMode(){

document.body.classList.toggle("light")

}

function saveHours(){

let h=document.getElementById("hours").value

document.getElementById("studyText").innerText=
"Today's study hours: "+h

document.getElementById("studyBar").style.width=(h*10)+"%"

let week=JSON.parse(localStorage.getItem("weekStudy"))||[]

week.push(h)

if(week.length>7) week.shift()

localStorage.setItem("weekStudy",JSON.stringify(week))

updateStreak()

loadChart()

}

function updateStreak(){

let streak=localStorage.getItem("streak")||0

streak++

localStorage.setItem("streak",streak)

document.getElementById("streak").innerText=
"Study Streak: "+streak+" days"

}

let savedStreak=localStorage.getItem("streak")

if(savedStreak){

document.getElementById("streak").innerText=
"Study Streak: "+savedStreak+" days"

}

function addHobby(){

let name=document.getElementById("hobbyName").value
let prog=document.getElementById("hobbyProgress").value

let div=document.createElement("div")

div.innerHTML=

"<h3>"+name+"</h3>"+
"<div class='progress'><div class='bar' style='width:"+prog+"%'></div></div>"

document.getElementById("hobbyList").appendChild(div)

}

function saveNote(){

let note=document.getElementById("note").value

localStorage.setItem("note",note)

document.getElementById("savedNote").innerText=note

}

let savedNote=localStorage.getItem("note")

if(savedNote){

document.getElementById("savedNote").innerText=savedNote

}

function loadChart(){

let week=JSON.parse(localStorage.getItem("weekStudy"))||[]

let ctx=document.getElementById("studyChart")

new Chart(ctx,{
type:"bar",
data:{
labels:["1","2","3","4","5","6","7"],
datasets:[{
label:"Study Hours",
data:week
}]
}
})

}

loadChart()

let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").style.display="block"

})

document.getElementById("installBtn").addEventListener("click",()=>{

deferredPrompt.prompt()

})

</script>

</body>
</html>
```
